<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav id="navbar">
        <a href="#welcome-section">Welcome</a>
        <a href="#project-section">Projects</a>
        <a href="#contact">Contact</a>
        <a href="https://github.com" target="_blank" id="profile-link">GitHub</a>
    </nav>

    <!-- Welcome Section -->
    <section id="welcome-section">
        <h1>Hello, I'm a Web Developer</h1>
        <p>I build things for the web</p>
    </section>

    <!-- Projects Section -->
    <section id="project-section">
        <h2>My Projects</h2>
        <div class="projects-grid">
            <div class="project-tile">
                <a href="https://example.com/project1" target="_blank">
                    <img src="https://via.placeholder.com/300x200?text=Project+1" alt="Project 1">
                    <p class="project-title">Tribute Page</p>
                </a>
            </div>
            <div class="project-tile">
                <a href="https://example.com/project2" target="_blank">
                    <img src="https://via.placeholder.com/300x200?text=Project+2" alt="Project 2">
                    <p class="project-title">Survey Form</p>
                </a>
            </div>
            <div class="project-tile">
                <a href="https://example.com/project3" target="_blank">
                    <img src="https://via.placeholder.com/300x200?text=Project+3" alt="Project 3">
                    <p class="project-title">Landing Page</p>
                </a>
            </div>
            <div class="project-tile">
                <a href="https://example.com/project4" target="_blank">
                    <img src="https://via.placeholder.com/300x200?text=Project+4" alt="Project 4">
                    <p class="project-title">Documentation</p>
                </a>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Let's Work Together</h2>
        <p>How do you take your coffee?</p>
        <div class="contact-links">
            <a href="https://facebook.com" target="_blank">Facebook</a>
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="mailto:example@email.com">Email</a>
        </div>
    </section>

    <footer>
        <p>© 2026 My Portfolio. All rights reserved.</p>
    </footer>
</body>

</html>
