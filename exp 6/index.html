<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Experiment 6</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Contact Form</h1>
        <p class="info">Name: Aditya Soni | Dept: AIML</p>

        <form id="contactForm" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Enter your email">
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" placeholder="Enter 10-digit phone number">
                <span class="error" id="phoneError"></span>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Min 6 characters">
                <span class="error" id="passwordError"></span>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>

        <button class="toggle-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>

        <div class="saved-data">
            <h3>Saved Data:</h3>
            <div id="displayArea">No data saved yet.</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
