<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="esp-3.css">
</head>
<body>

<header id="header">
    <img 
        id="header-img" 
        src="C:\Users\HP\Documents\web-57\yt.jpg"
        alt="YouTube Logo"
    >

    <nav id="nav-bar">
        <a class="nav-link" href="#features">Features</a>
        <a class="nav-link" href="#video-section">Video</a>
        <a class="nav-link" href="#contact">Contact</a>

            placeholder="Enter your email"

            type="submit"
            id="submit"
            value="Submit"
        >
    </form>
</section>
