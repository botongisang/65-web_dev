<!DOCTYPE html>
<html lang="en">
<head>

    <title>Newspaper Layout</title>
    <link rel="stylesheet" href="esp-3.css">
</head>
<body>

<main class="newspaper-layout">

    <header class="title">
        <h1>The Daily Times</h1>
    </header>

    <article class="feature-article">
        <h2>Main Headline</h2>
        <p>This is the main featured news article of the newspaper.</p>
    </article>

    <figure class="cover-image">
        <img src="C:\Users\pksj4\OneDrive\Documents\College\news.jpg" alt="News Image">
    </figure>

    <article class="secondary-article">
        <h2>Secondary News</h2>
        <p>This section contains additional important news.</p>
    </article>

    <article class="small-article1">
        <h3>News 1</h3>
        <p>Ajit Pawar Died in Plane Crash.</p>
    </article>

    <article class="small-article2">
        <h3>News 2</h3>
        <p>Public holiday.</p>
    </article>

    <article class="small-article3">
        <h3>News 3</h3>
        <p>SFIT got highest placement in entire mumbai.</p>
    </article>

</main>

</body>
</html>
