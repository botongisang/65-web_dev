<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <form>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" required><br><br>
        <label for="position">Job Position:</label><br>
        <select id="position" required>
            <option value="">Select Position</option>
            <option value="developer">Web Developer</option>
            <option value="designer">UI Designer</option>
            <option value="tester">Software Tester</option>
        </select><br><br>
        <fieldset class="radio-group">
            <legend>Availability</legend>

            <input type="radio" id="fulltime" name="availability" value="fulltime">
            <label for="fulltime">Full-Time</label><br>

            <input type="radio" id="parttime" name="availability" value="parttime">
            <label for="parttime">Part-Time</label>
        </fieldset><br>
        <label for="message">Message:</label><br>
        <textarea id="message" rows="4" required></textarea><br><br>
        <button type="submit">Submit Application</button>
    </form>
</div>
</body>
</html>
