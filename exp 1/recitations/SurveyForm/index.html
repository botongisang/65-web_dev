<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 id="title">Survey Form</h1>
    <p id="description">Please take a moment to fill out this survey and help us improve our services.</p>

    <form id="survey-form">
        <label id="name-label" for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label id="email-label" for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label id="number-label" for="number">Age</label>
        <input type="number" id="number" name="age" placeholder="Enter your age" min="10" max="120">

        <label for="dropdown">Which option best describes your current role?</label>
        <select id="dropdown" name="role">
            <option disabled selected value>Select an option</option>
            <option value="student">Student</option>
            <option value="job">Full Time Job</option>
            <option value="learner">Full Time Learner</option>
            <option value="other">Other</option>
        </select>

        <label>Would you recommend our service to a friend?</label>
        <div class="radio-group">
            <input type="radio" id="definitely" name="recommend" value="definitely">
            <label for="definitely">Definitely</label>
            <input type="radio" id="maybe" name="recommend" value="maybe">
            <label for="maybe">Maybe</label>
            <input type="radio" id="not-sure" name="recommend" value="not-sure">
            <label for="not-sure">Not sure</label>
        </div>

        <label>What would you like to see improved? (Check all that apply)</label>
        <div class="checkbox-group">
            <input type="checkbox" id="frontend" name="improve" value="frontend">
            <label for="frontend">Front-end Projects</label>
            <input type="checkbox" id="backend" name="improve" value="backend">
            <label for="backend">Back-end Projects</label>
            <input type="checkbox" id="challenges" name="improve" value="challenges">
            <label for="challenges">Coding Challenges</label>
            <input type="checkbox" id="community" name="improve" value="community">
            <label for="community">Community Support</label>
        </div>

        <label for="comments">Any comments or suggestions?</label>
        <textarea id="comments" name="comments" rows="5" placeholder="Enter your comments here..."></textarea>

        <button type="submit" id="submit">Submit</button>
    </form>
</body>

</html>
